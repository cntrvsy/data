- title: "Software Engineer (Rust/Typescript)"
  professional_summary: "Engineer with a strong focus on building reliable, reproducible systems using Rust and TypeScript. Experienced in designing clean architectures, debugging complex pipelines, and delivering maintainable codebases that prioritize clarity, performance, and long‑term stability."
- title: "Fullstack Developer (Rust/Typescript)"
  professional_summary: "Full‑stack developer comfortable moving across backend services, modern TypeScript frontends, and deployment workflows. Skilled in Rust backends, SvelteKit applications, and Cloudflare‑based architectures. Values reproducibility, thoughtful design, and developer‑friendly tooling."
- title: "Backend Developer (Rust/Typescript)"
  professional_summary: "Backend‑focused developer specializing in robust API design, data‑layer reliability, and scalable service patterns. Strong experience with Rust, TypeScript, and building systems that emphasize correctness, maintainability, and predictable deployments."
- title: "Frontend Developer (Svelte/React/Typescript)"
  professional_summary: "Frontend developer experienced in SvelteKit, React, and modern TypeScript tooling. Builds clean, accessible, and responsive interfaces with strong attention to layout hierarchy, performance, and user‑focused design. Comfortable debugging complex UI state and crafting reusable components."
- title: "Data/Business Analyst (Python/SQL/Rust)"
  professional_summary: "Analyst with experience in Python, SQL, and lightweight Rust tooling for data processing. Skilled at transforming raw datasets into clear insights, building dashboards, and producing structured, reference‑rich briefs that support decision‑making and stakeholder communication."
